<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mystery Box 🎁</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Segoe UI',sans-serif;
      background:linear-gradient(160deg,#0a0020,#1a0040,#0a0020);
      min-height:100vh;
      display:flex;flex-direction:column;
      justify-content:center;align-items:center;
      color:#fff;overflow:hidden;padding:30px 20px;
    }
    .page-title{font-size:clamp(18px,5vw,22px);font-weight:700;margin-bottom:6px;text-align:center;}
    .page-sub{font-size:13px;opacity:0.55;margin-bottom:36px;text-align:center;}

    /* BOX STAGE */
    #boxStage{
      position:relative;
      display:flex;flex-direction:column;
      align-items:center;gap:0;
    }

    .gift-box{
      cursor:pointer;
      display:flex;flex-direction:column;
      align-items:center;
      transition:transform 0.3s;
      position:relative;
    }
    .gift-box:hover{transform:scale(1.05);}
    .gift-box:active{transform:scale(0.97);}

    /* lid */
    .box-lid{
      border-radius:8px 8px 0 0;
      background:linear-gradient(135deg,#ff4f81,#c471ed);
      display:flex;justify-content:center;align-items:center;
      position:relative;
      box-shadow:0 -4px 20px rgba(255,80,130,0.4);
    }
    .box-lid::after{
      content:'';
      position:absolute;
      bottom:-4px;left:50%;transform:translateX(-50%);
      width:60%;height:8px;
      background:rgba(255,255,255,0.3);
      border-radius:4px;
    }
    /* body */
    .box-body{
      border-radius:0 0 12px 12px;
      background:linear-gradient(160deg,#c471ed,#8a2be2);
      display:flex;justify-content:center;align-items:center;
      box-shadow:0 20px 50px rgba(100,0,200,0.5);
    }
    .box-ribbon-v{
      position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);
      width:12%;background:rgba(255,255,255,0.25);
    }
    .box-ribbon-h{
      position:absolute;top:30%;left:0;right:0;
      height:12%;background:rgba(255,255,255,0.25);
    }
    .bow{font-size:inherit;line-height:1;}

    .click-hint{
      margin-top:14px;font-size:13px;opacity:0.55;
      animation:pulse 1.5s infinite;
    }
    @keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:0.9;}}

    /* open animation */
    .box-open{animation:boxOpen 0.5s ease forwards;}
    @keyframes boxOpen{
      0%{transform:scale(1);}
      30%{transform:scale(1.12)rotate(-3deg);}
      60%{transform:scale(0.95)rotate(2deg);}
      100%{transform:scale(1)rotate(0);}
    }

    /* step label */
    #stepLabel{
      font-size:14px;opacity:0.5;margin-bottom:20px;
      min-height:20px;text-align:center;
    }

    /* COMPLIMENT RAIN */
    #rainStage{
      display:none;
      position:fixed;inset:0;
      background:linear-gradient(160deg,#0a0020,#1a0040);
      overflow:hidden;z-index:50;
      flex-direction:column;justify-content:center;align-items:center;
    }
    .rain-word{
      position:absolute;
      top:-40px;
      font-size:14px;font-weight:700;
      border-radius:20px;
      padding:5px 14px;
      pointer-events:none;
      animation:rainFall linear forwards;
    }
    @keyframes rainFall{
      0%{transform:translateY(0) rotate(var(--rot));opacity:0;}
      10%{opacity:1;}
      90%{opacity:1;}
      100%{transform:translateY(110vh) rotate(var(--rot));opacity:0;}
    }
    #finalMsg{
      display:none;
      position:relative;z-index:5;
      text-align:center;padding:30px 24px;
      max-width:min(340px,90vw);
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(16px);
      border-radius:24px;
      border:1px solid rgba(255,80,130,0.3);
      box-shadow:0 25px 60px rgba(0,0,0,0.6),0 0 60px rgba(255,80,130,0.2);
      animation:zoomIn 0.8s ease;
    }
    @keyframes zoomIn{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
    #finalMsg .ficon{font-size:52px;margin-bottom:14px;}
    #finalMsg .ftitle{font-size:clamp(17px,5vw,20px);font-weight:700;color:#ffd700;margin-bottom:12px;}
    #finalMsg .ftext{font-size:clamp(13px,4vw,15px);line-height:1.8;color:rgba(255,255,255,0.85);}

    .next-btn{
      margin-top:28px;padding:13px 40px;
      border:none;border-radius:50px;
      background:linear-gradient(135deg,#ff4f81,#c471ed);
      color:#fff;font-size:16px;font-weight:700;cursor:pointer;
      box-shadow:0 14px 35px rgba(255,80,130,0.4);
      transition:transform 0.2s;display:none;
    }
    .next-btn:hover{transform:translateY(-3px);}

    /* floating hearts bg */
    .float-heart{
      position:fixed;pointer-events:none;
      animation:floatUp linear infinite;opacity:0;z-index:0;
    }
    @keyframes floatUp{
      0%{transform:translateY(100vh);opacity:0;}
      20%{opacity:0.5;}80%{opacity:0.3;}
      100%{transform:translateY(-10vh);opacity:0;}
    }
      img { max-width: 100%; height: auto; }
    input, button { -webkit-appearance: none; border-radius: 10px; }
  </style>
</head>
<body>

<script>
  const e=['❤️','💜','✨','🌸','💫'];
  for(let i=0;i<12;i++){
    const d=document.createElement('div');
    d.className='float-heart';
    d.innerText=e[i%e.length];
    d.style.left=Math.random()*100+'vw';
    d.style.animationDuration=(8+Math.random()*6)+'s';
    d.style.animationDelay=(Math.random()*8)+'s';
    d.style.fontSize=(11+Math.random()*10)+'px';
    document.body.appendChild(d);
  }
</script>

<div class="page-title">🎁 Mystery Box</div>
<div class="page-sub">Click to open… something magical is inside</div>
<div id="stepLabel">Step 1 of 4 — Click to open!</div>

<div id="boxStage">
  <!-- box rendered by JS -->
</div>
<div class="click-hint" id="clickHint">👆 Tap the box!</div>

<!-- RAIN STAGE -->
<div id="rainStage">
  <div id="finalMsg">
    <div class="ficon">💝</div>
    <div class="ftitle">All these words…</div>
    <div class="ftext">still not enough for you.<br><br>
      Because you are more than any word<br>
      this world has ever created. ❤️
    </div>
    <button class="next-btn" id="nextBtn" onclick="location.href='garden.html'">
      അടുത്തത് 🧩
    </button>
  </div>
</div>

<script>
const boxes=[
  {size:220,lidH:55,emoji:'🎁',label:'Step 1 of 4 — Click to open!'},
  {size:170,lidH:44,emoji:'🎀',label:'Step 2 of 4 — Another box inside!'},
  {size:125,lidH:34,emoji:'💝',label:'Step 3 of 4 — One more…'},
  {size:85, lidH:24,emoji:'✨',label:'Step 4 — The last one! ✨'},
];
let step=0;

const stage=document.getElementById('boxStage');
const stepLbl=document.getElementById('stepLabel');
const hint=document.getElementById('clickHint');

function buildBox(i){
  stage.innerHTML='';
  const b=boxes[i];
  const s=b.size;

  const wrap=document.createElement('div');
  wrap.className='gift-box';
  wrap.id='currentBox';

  // lid
  const lid=document.createElement('div');
  lid.className='box-lid';
  lid.style.cssText=`width:${s+20}px;height:${b.lidH}px;font-size:${b.lidH*0.5}px;`;
  lid.innerHTML=`<div class="box-ribbon-v"></div><div class="box-ribbon-h"></div><span class="bow">🎀</span>`;

  // body
  const body=document.createElement('div');
  body.className='box-body';
  body.style.cssText=`width:${s}px;height:${s}px;font-size:${s*0.45}px;`;
  body.innerHTML=`<div class="box-ribbon-v"></div><div class="box-ribbon-h"></div><span>${b.emoji}</span>`;

  wrap.appendChild(lid);
  wrap.appendChild(body);
  wrap.onclick=()=>openBox();
  stage.appendChild(wrap);

  stepLbl.textContent=b.label;

  // entrance animation
  wrap.style.animation='none';
  wrap.style.opacity='0';
  wrap.style.transform='scale(0.5)';
  wrap.style.transition='opacity 0.5s,transform 0.5s';
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      wrap.style.opacity='1';
      wrap.style.transform='scale(1)';
    });
  });
}

function openBox(){
  const box=document.getElementById('currentBox');
  box.classList.add('box-open');
  // burst
  for(let i=0;i<20;i++){
    const h=document.createElement('div');
    h.style.cssText=`position:fixed;font-size:${14+Math.random()*16}px;
      pointer-events:none;z-index:100;
      left:${30+Math.random()*40}vw;top:${20+Math.random()*40}vh;
      animation:floatUp ${1.5+Math.random()*1.5}s ease forwards`;
    h.innerText=['✨','💜','🌸','💝','⭐'][Math.floor(Math.random()*5)];
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),3000);
  }
  setTimeout(()=>{
    step++;
    if(step<boxes.length){
      buildBox(step);
    } else {
      startRain();
    }
  },500);
}

buildBox(0);

/* COMPLIMENT RAIN */
const words=[
  {t:'Cute 🌸',     c:'#ff9ad5'},
  {t:'Kind 💜',     c:'#c471ed'},
  {t:'Beautiful ✨', c:'#ffd700'},
  {t:'Dangerously Charming 😍',c:'#ff4f81'},
  {t:'My Favourite Human 💝',  c:'#12c2e9'},
  {t:'Sunshine ☀️', c:'#ffcc00'},
  {t:'Magical 🌙',  c:'#a78bfa'},
  {t:'Warm-hearted 🤍',c:'#fff'},
  {t:'Precious 💎', c:'#38bdf8'},
  {t:'Sweet 🍯',    c:'#fbbf24'},
  {t:'Irreplaceable 💫',c:'#f472b6'},
  {t:'My World 🌍', c:'#34d399'},
  {t:'Adorable 🐻', c:'#fb923c'},
  {t:'Stunning 🌹', c:'#f87171'},
  {t:'One of a Kind 🦋',c:'#818cf8'},
];

function startRain(){
  hint.style.display='none';
  stepLbl.textContent='';
  stage.style.display='none';
  const rain=document.getElementById('rainStage');
  rain.style.display='flex';

  let dropped=0;
  const total=words.length*3; // 3 rounds
  const interval=setInterval(()=>{
    if(dropped>=total){clearInterval(interval);showFinal();return;}
    const w=words[dropped%words.length];
    const span=document.createElement('div');
    span.className='rain-word';
    span.textContent=w.t;
    span.style.left=Math.random()*90+'vw';
    span.style.background=w.c+'33';
    span.style.border=`1px solid ${w.c}66`;
    span.style.color=w.c;
    const dur=2.5+Math.random()*2;
    const rot=(Math.random()-0.5)*20+'deg';
    span.style.setProperty('--rot',rot);
    span.style.animationDuration=dur+'s';
    rain.appendChild(span);
    setTimeout(()=>span.remove(),(dur+0.5)*1000);
    dropped++;
  },180);
}

function showFinal(){
  const fm=document.getElementById('finalMsg');
  const nb=document.getElementById('nextBtn');
  fm.style.display='block';
  setTimeout(()=>nb.style.display='block',800);
}
</script>
<script>
(function(){
  /* ── Music engine: seamless across all pages ── */
  if (!window.bgMusic) {
    window.bgMusic = new Audio("assets/music/anju-song.mp3");
    window.bgMusic.loop = true;
    window.bgMusic.volume = 0.6;
    window.bgMusic.preload = "auto";
  }
  // Save position continuously
  window.bgMusic.ontimeupdate = function() {
    try { localStorage.setItem("musicTime", window.bgMusic.currentTime); } catch(e){}
  };
  // Restore position + try autoplay
  var _t = null;
  try { _t = localStorage.getItem("musicTime"); } catch(e){}
  if (_t) window.bgMusic.currentTime = parseFloat(_t);
  window.bgMusic.play().catch(function(){});

  // iOS Safari fix: play on very first touch anywhere on page
  function _tryPlay(){ window.bgMusic.play().catch(function(){}); }
  document.addEventListener("touchstart", _tryPlay, {once:true, passive:true});
  document.addEventListener("click",      _tryPlay, {once:true, passive:true});

  // Save before leaving
  window.addEventListener("pagehide", function(){
    try { localStorage.setItem("musicTime", window.bgMusic.currentTime); } catch(e){}
  });
  window.addEventListener("beforeunload", function(){
    try { localStorage.setItem("musicTime", window.bgMusic.currentTime); } catch(e){}
  });
  // Pause/resume on visibility change (battery + lag fix)
  document.addEventListener("visibilitychange", function(){
    if (document.hidden) window.bgMusic.pause();
    else window.bgMusic.play().catch(function(){});
  });
})();
</script>
</body>
</html>
