<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#04000f">
<title>Magic Mirror 🪞</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;height:100dvh;
  overflow:hidden;background:#04000f;
  font-family:'Cormorant Garamond',serif;
  touch-action:manipulation;
  -webkit-font-smoothing:antialiased;
}

/* ─── BACKGROUND ─── */
#bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;}

/* ─── INTRO ─── */
#introScreen{
  position:fixed;inset:0;z-index:80;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:max(env(safe-area-inset-top,20px),32px) 28px max(env(safe-area-inset-bottom,20px),32px);
  background:radial-gradient(ellipse at 50% 38%,#1c0848 0%,#04000f 68%);
  transition:opacity .9s ease;
}
#introScreen.hide{opacity:0;pointer-events:none;}

.i-icon{
  font-size:clamp(62px,18vw,82px);
  margin-bottom:14px;
  animation:iRock 4s ease-in-out infinite;
  filter:drop-shadow(0 0 28px rgba(196,113,237,.65));
}
@keyframes iRock{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}

.i-title{
  font-family:'Cinzel',serif;font-weight:700;
  font-size:clamp(22px,6vw,30px);
  letter-spacing:.18em;color:#fff;
  margin-bottom:10px;
  text-shadow:0 0 28px rgba(196,113,237,.8),0 0 60px rgba(196,113,237,.3);
}
.i-sub{
  font-size:clamp(14px,4vw,16px);font-style:italic;
  color:rgba(255,195,215,.8);line-height:1.95;
  margin-bottom:34px;max-width:300px;
}
.i-btn{
  padding:16px 52px;border:none;border-radius:50px;
  background:linear-gradient(135deg,#c471ed,#ff4f95);
  color:#fff;font-family:'Cinzel',serif;
  font-size:15px;font-weight:700;letter-spacing:.15em;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  box-shadow:0 0 35px rgba(196,113,237,.5),0 15px 40px rgba(0,0,0,.4);
  animation:iBtnPulse 2.5s ease-in-out infinite;
}
@keyframes iBtnPulse{
  0%,100%{box-shadow:0 0 28px rgba(196,113,237,.4),0 14px 35px rgba(0,0,0,.4);}
  50%{box-shadow:0 0 62px rgba(196,113,237,.75),0 14px 50px rgba(0,0,0,.5);}
}

/* ─── MAIN APP ─── */
#mainApp{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;
  padding:max(env(safe-area-inset-top,8px),12px) 14px max(env(safe-area-inset-bottom,8px),12px);
  gap:10px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  opacity:0;pointer-events:none;
  transition:opacity .8s ease;
}
#mainApp.on{opacity:1;pointer-events:auto;}

/* ─── MIRROR ─── */
#mirrorWrap{
  position:relative;
  width:min(190px,50vw);
  flex-shrink:0;
  margin-top:4px;
}
#crown{
  position:absolute;top:-16px;left:50%;
  transform:translateX(-50%);
  z-index:12;font-size:24px;
  filter:drop-shadow(0 0 12px rgba(255,215,0,.8));
  animation:crownFloat 3s ease-in-out infinite;
}
@keyframes crownFloat{
  0%,100%{transform:translateX(-50%) translateY(0);}
  50%{transform:translateX(-50%) translateY(-5px);}
}
.sgem{
  position:absolute;top:30%;
  width:12px;height:12px;border-radius:50%;z-index:12;
  animation:gemPop 2.6s ease-in-out infinite;
}
.sgem.l{left:-7px;background:radial-gradient(circle at 35%,#ff9ad5,#c471ed);box-shadow:0 0 14px rgba(196,113,237,.7);}
.sgem.r{right:-7px;background:radial-gradient(circle at 35%,#ffd700,#f59e0b);box-shadow:0 0 14px rgba(255,215,0,.7);animation-delay:.75s;}
@keyframes gemPop{0%,100%{transform:scale(1);}50%{transform:scale(1.28);}}

#mirrorFrame{
  width:100%;padding-top:126%;
  position:relative;
  border-radius:50% 50% 44% 44%/42% 42% 58% 58%;
  overflow:hidden;
  box-shadow:
    0 0 0 2px rgba(196,113,237,.3),
    0 0 0 5px rgba(124,58,237,.12),
    0 0 28px rgba(167,139,250,.28),
    0 0 65px rgba(124,58,237,.18);
}
#mRing{
  position:absolute;inset:-2px;border-radius:inherit;
  background:conic-gradient(
    from 0deg,
    transparent 0%,
    rgba(255,215,0,.65) 14%,
    rgba(196,113,237,.55) 30%,
    rgba(255,79,149,.42) 50%,
    rgba(167,139,250,.5) 64%,
    rgba(255,215,0,.55) 78%,
    transparent 92%
  );
  animation:ringRotate 5s linear infinite;
  z-index:1;
}
@keyframes ringRotate{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
#mInner{
  position:absolute;inset:4px;border-radius:inherit;
  background:radial-gradient(ellipse at 38% 33%,#2c0e62 0%,#0d0228 58%,#180438 100%);
  z-index:2;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
#mInner::before{
  content:'';position:absolute;inset:0;
  background:conic-gradient(
    from 180deg at 45% 45%,
    rgba(196,113,237,.07) 0%,
    rgba(255,79,149,.04) 25%,
    rgba(167,139,250,.09) 50%,
    rgba(255,215,0,.03) 75%,
    rgba(196,113,237,.07) 100%
  );
  animation:swirlR 14s linear infinite;
}
@keyframes swirlR{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
#mRune{
  position:relative;z-index:3;
  font-size:clamp(30px,10vw,44px);
  color:rgba(255,215,0,.42);
  font-family:'Cinzel',serif;
  animation:runeFloat 3.2s ease-in-out infinite;
  text-shadow:0 0 22px rgba(255,215,0,.38);
  user-select:none;transition:color .4s,text-shadow .4s;
}
@keyframes runeFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-7px) scale(1.05);}}
#mRune.glow{color:rgba(255,215,0,.95);text-shadow:0 0 35px rgba(255,215,0,.8);}

.m-label{
  font-family:'Cinzel',serif;
  font-size:clamp(9px,2.6vw,11px);
  letter-spacing:.22em;
  color:rgba(255,215,0,.52);
  text-align:center;
  text-shadow:0 0 14px rgba(255,215,0,.3);
  flex-shrink:0;
}

/* ─── CHAT ─── */
#chatBox{
  width:100%;max-width:420px;
  display:flex;flex-direction:column;gap:10px;
}
.bbl{
  max-width:88%;
  padding:11px 15px;
  border-radius:18px;
  font-size:clamp(13px,3.8vw,15px);
  line-height:1.72;
  white-space:pre-line;
  animation:bblIn .5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes bblIn{from{opacity:0;transform:translateY(10px) scale(.94);}to{opacity:1;transform:none;}}
.bbl.mirror{
  align-self:flex-start;
  background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(76,29,149,.12));
  border:1px solid rgba(167,139,250,.22);
  color:rgba(240,220,255,.92);
  border-bottom-left-radius:5px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.bbl.user{
  align-self:flex-end;
  background:linear-gradient(135deg,rgba(255,79,149,.18),rgba(196,113,237,.1));
  border:1px solid rgba(255,154,213,.2);
  color:rgba(255,230,255,.9);
  border-bottom-right-radius:5px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}

/* typing dots */
#dots{
  align-self:flex-start;display:none;
  padding:10px 16px;
  background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(76,29,149,.1));
  border:1px solid rgba(167,139,250,.18);
  border-radius:18px;border-bottom-left-radius:5px;
  gap:5px;align-items:center;
  animation:bblIn .35s both;
}
#dots.show{display:flex;}
#dots span{
  width:7px;height:7px;border-radius:50%;
  background:#c471ed;opacity:.45;
  animation:dotB 1.3s ease-in-out infinite;
}
#dots span:nth-child(2){animation-delay:.22s;}
#dots span:nth-child(3){animation-delay:.44s;}
@keyframes dotB{0%,80%,100%{transform:scale(1);opacity:.35;}40%{transform:scale(1.3);opacity:1;}}

/* ─── CHOICES ─── */
#choices{
  width:100%;max-width:420px;
  display:flex;flex-wrap:wrap;gap:8px;
  justify-content:center;flex-shrink:0;
}
.cbtn{
  padding:10px 18px;
  border:1px solid rgba(196,113,237,.32);
  border-radius:50px;
  background:rgba(124,58,237,.09);
  color:rgba(240,210,255,.88);
  font-family:'Cinzel',serif;
  font-size:clamp(11px,3vw,12px);
  letter-spacing:.05em;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:background .18s,transform .12s;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:bblIn .45s both;
}
.cbtn:active{transform:scale(.95);background:rgba(196,113,237,.24);}

/* ─── FINAL CTA ─── */
#finalCTA{
  display:none;
  width:100%;max-width:420px;
  padding:17px;border:none;border-radius:50px;
  background:linear-gradient(135deg,#ffd700 0%,#ff9a00 40%,#ff4f95 100%);
  color:#fff;font-family:'Cinzel',serif;
  font-size:clamp(13px,4vw,15px);font-weight:700;letter-spacing:.14em;
  cursor:pointer;text-align:center;
  box-shadow:0 0 40px rgba(255,180,50,.4),0 14px 38px rgba(0,0,0,.4);
  -webkit-tap-highlight-color:transparent;
  animation:ctaP 2.5s ease-in-out infinite;
  flex-shrink:0;
}
#finalCTA.on{display:block;}
@keyframes ctaP{
  0%,100%{box-shadow:0 0 32px rgba(255,180,50,.35),0 14px 35px rgba(0,0,0,.35);}
  50%{box-shadow:0 0 70px rgba(255,180,50,.72),0 14px 45px rgba(0,0,0,.5);}
}

/* ─── PETALS ─── */
.petal{
  position:fixed;pointer-events:none;z-index:70;
  animation:pFall linear forwards;
}
@keyframes pFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:0;}
  8%{opacity:1;}90%{opacity:.75;}
  100%{transform:translateY(110vh) rotate(var(--pr));opacity:0;}
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- ══ INTRO ══ -->
<div id="introScreen">
  <div class="i-icon">🪞</div>
  <div class="i-title">The Magic Mirror</div>
  <div class="i-sub">
    ഒരു കണ്ണാടിയുണ്ട്…<br>
    അതിൽ നിന്റെ ഹൃദയത്തിന്റെ<br>
    <em>രഹസ്യങ്ങൾ ഉറങ്ങുന്നു 🌙</em>
  </div>
  <button class="i-btn" onclick="beginMirror()">കണ്ണാടിയിലേക്ക് നോക്കൂ ✨</button>
</div>

<!-- ══ MAIN ══ -->
<div id="mainApp">

  <div id="mirrorWrap">
    <div id="crown">✦</div>
    <div class="sgem l"></div>
    <div class="sgem r"></div>
    <div id="mirrorFrame">
      <div id="mRing"></div>
      <div id="mInner">
        <div id="mRune">◈</div>
      </div>
    </div>
  </div>

  <div class="m-label">∿ &nbsp; The Mirror Speaks &nbsp; ∿</div>

  <div id="chatBox">
    <div id="dots"><span></span><span></span><span></span></div>
  </div>

  <div id="choices"></div>

  <button id="finalCTA" onclick="goNext()">🎂 &nbsp; അടുത്തത് കാണൂ &nbsp; ✨</button>

</div>

<script>
/* ══════════════════════════════
   BG CANVAS — stars + aurora
══════════════════════════════ */
const bgC = document.getElementById('bgCanvas');
const bgX = bgC.getContext('2d');
let W, H;
function resize(){ W = bgC.width = window.innerWidth; H = bgC.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize, {passive:true});

const stars = Array.from({length:150}, () => ({
  x:Math.random(), y:Math.random()*.88,
  r:.25+Math.random()*1.35,
  a:.1+Math.random()*.7,
  tw:Math.random()*Math.PI*2,
  spd:.6+Math.random()*1.6,
}));

let tick=0, auroraT=0;
(function bgLoop(){
  tick++;
  bgX.clearRect(0,0,W,H);

  const sg = bgX.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#04000f');
  sg.addColorStop(.42,'#120535');
  sg.addColorStop(.78,'#1a0545');
  sg.addColorStop(1,'#0a0414');
  bgX.fillStyle=sg; bgX.fillRect(0,0,W,H);

  auroraT+=.0022;
  [{h:280,y:.2},{h:210,y:.34},{h:320,y:.13}].forEach(b=>{
    const by=b.y*H;
    const ag=bgX.createLinearGradient(0,by-65,0,by+65);
    const w=Math.sin(auroraT+b.h*.01)*.1;
    ag.addColorStop(0,'transparent');
    ag.addColorStop(.38+w,`hsla(${b.h},80%,62%,.07)`);
    ag.addColorStop(.5,`hsla(${b.h},80%,62%,.14)`);
    ag.addColorStop(.62-w,`hsla(${b.h},80%,62%,.06)`);
    ag.addColorStop(1,'transparent');
    bgX.save();bgX.globalCompositeOperation='screen';
    bgX.fillStyle=ag; bgX.fillRect(0,by-65,W,130);
    bgX.restore();
  });

  stars.forEach(s=>{
    const t=.55+.45*Math.sin(tick*.018*s.spd+s.tw);
    bgX.beginPath();bgX.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    bgX.fillStyle=`rgba(255,255,255,${s.a*t})`; bgX.fill();
  });

  // moon
  const mx=W*.82, my=H*.08, mr=W<400?20:26;
  const mh=bgX.createRadialGradient(mx,my,mr*.5,mx,my,mr*3);
  mh.addColorStop(0,'rgba(255,230,100,.18)'); mh.addColorStop(1,'transparent');
  bgX.fillStyle=mh; bgX.beginPath(); bgX.arc(mx,my,mr*3,0,Math.PI*2); bgX.fill();
  const mg=bgX.createRadialGradient(mx-mr*.3,my-mr*.3,0,mx,my,mr);
  mg.addColorStop(0,'#fffde8'); mg.addColorStop(.65,'#f0d870'); mg.addColorStop(1,'#c8a830');
  bgX.fillStyle=mg; bgX.beginPath(); bgX.arc(mx,my,mr,0,Math.PI*2); bgX.fill();

  requestAnimationFrame(bgLoop);
})();

/* ══════════════════════════════
   MIRROR RUNE CYCLE
══════════════════════════════ */
const runes=['◈','✦','⟁','✧','⬡','◉','❋','⟡','☽','✵'];
let runeIdx=0;
setInterval(()=>{
  runeIdx=(runeIdx+1)%runes.length;
  document.getElementById('mRune').textContent=runes[runeIdx];
},2600);

/* ══════════════════════════════
   CONVERSATION
══════════════════════════════ */
const STEPS=[
  {
    msg:`🪞 ഞാൻ ആണ് പഞ്ചമുഖി മാന്ത്രിക കണ്ണാടി.\n\nഅഞ്ച് ദിക്കുകളുടെ രഹസ്യ ഊർജം എന്റെ ഉള്ളിൽ പ്രതിഫലിക്കുന്നു.\n\nഎന്നെ നോക്കുന്നവർക്ക് സത്യത്തിന്റെ പ്രതിബിംബവും ആത്മശക്തിയുടെ വിളക്കുമാണ് ഞാൻ. ✨`,
    choices:['തുടരൂ… 🌟'],
    next:[1]
  },
  {
    msg:`🪞 കണ്ണാടി ഉണരുന്നു…\n\nആരോ വിശുദ്ധമായ ഹൃദയത്തോടെ ഇവിടെ വന്നിരിക്കുന്നു.\n\nനിന്നെ ഇവിടേക്ക് ആരാണ് അയച്ചത്?`,
    choices:['ഞാൻ സ്നേഹിക്കുന്ന ഒരാൾ 💕','ഞാൻ സ്വയം കണ്ടെത്തി 🌟'],
    next:[2,2]
  },
  {
    msg:`✨ കണ്ണാടി ചിരിക്കുന്നു…\n\nസ്നേഹം കൊണ്ട് നയിക്കപ്പെട്ട ഒരു ആത്മാവ്.\n\nആ വ്യക്തിയെ കുറിച്ച് ചിന്തിക്കുമ്പോൾ നിന്റെ ഹൃദയം എന്ത് അനുഭവിക്കുന്നു?`,
    choices:['ഊഷ്മളതയും സന്തോഷവും 🌸','വർണ്ണിക്കാൻ കഴിയാത്ത ഒന്ന് 💫','വീടുപോലെ തോന്നുന്നു 🏡'],
    next:[3,3,3]
  },
  {
    msg:`🌟 കണ്ണാടി തിളങ്ങുന്നു…\n\nനിന്റെ വികാരങ്ങൾ ശുദ്ധവും ആഴവുമുള്ളവയാണ്.\n\nഇന്ന് നിനക്ക് ഒരു പ്രത്യേക ദിവസമാണ്  — അതിനെ കുറിച്ച് നിനക്ക് അറിയാമോ?`,
    choices:['അതെ, ഇന്ന് ജന്മദിനം 🎂','എന്തോ പ്രത്യേകത അനുഭവിക്കുന്നു ✨'],
    next:[4,4]
  },
  {
    msg:`🎉 ജന്മദിനാശംസകൾ, പ്രിയ അഞ്ചു!\n\nതാരങ്ങൾ നിനക്കുവേണ്ടി ഒരുക്കിയ ഒരു സമ്മാനം ഉണ്ട്…\n\nഅതു സ്വീകരിക്കാൻ നീ തയ്യാറാണോ? 🌸`,
    choices:['തയ്യാറാണ്, കാണണം! 💖'],
    next:[5]
  },
  {
    msg:`🌟 കണ്ണാടി വഴി തുറക്കുന്നു…\n\nഏറ്റവും ഹൃദ്യമായ സ്നേഹത്തോടെ, നിനക്കുവേണ്ടി ഒരുക്കിയതാണ് ഇത്. 🌸✨\n\nചുവടെ ഉള്ള ബട്ടൺ അമർത്തൂ…`,
    choices:null,
    final:true
  }
];

const chatBox=document.getElementById('chatBox');
const choicesDiv=document.getElementById('choices');
const dotsEl=document.getElementById('dots');
const finalBtn=document.getElementById('finalCTA');
const mRune=document.getElementById('mRune');

function addBubble(text,type,delay=0){
  return new Promise(resolve=>{
    setTimeout(()=>{
      const d=document.createElement('div');
      d.className=`bbl ${type}`;
      d.textContent=text;
      chatBox.insertBefore(d,dotsEl);
      setTimeout(()=>d.scrollIntoView({behavior:'smooth',block:'nearest'}),80);
      resolve();
    },delay);
  });
}

function showChoices(choices,nextArr){
  choicesDiv.innerHTML='';
  choices.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='cbtn';
    b.textContent=c;
    b.style.animationDelay=(i*.12)+'s';
    b.onclick=()=>{
      choicesDiv.innerHTML='';
      addBubble(c,'user');
      setTimeout(()=>runStep(nextArr[i]),480);
    };
    choicesDiv.appendChild(b);
  });
  setTimeout(()=>choicesDiv.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

async function runStep(idx){
  const step=STEPS[idx];

  // glow the rune
  mRune.classList.add('glow');
  setTimeout(()=>mRune.classList.remove('glow'),1400);

  dotsEl.classList.add('show');
  setTimeout(()=>dotsEl.scrollIntoView({behavior:'smooth',block:'nearest'}),50);

  const typingTime=Math.min(1000+step.msg.length*11, 3000);
  await addBubble(step.msg,'mirror',typingTime);
  dotsEl.classList.remove('show');

  if(step.final){
    spawnPetals();
    finalBtn.classList.add('on');
    setTimeout(()=>finalBtn.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
  } else if(step.choices){
    showChoices(step.choices,step.next);
  }
}

/* ══ START ══ */
function beginMirror(){
  const intro=document.getElementById('introScreen');
  intro.classList.add('hide');
  setTimeout(()=>intro.style.display='none',900);
  document.getElementById('mainApp').classList.add('on');
  setTimeout(()=>runStep(0),650);
}

/* ══ PETALS ══ */
function spawnPetals(){
  const e=['🌸','🌺','🌼','💮','🌷','✿','💫','✨','🌟'];
  let n=0;
  const iv=setInterval(()=>{
    if(n++>45){clearInterval(iv);return;}
    const p=document.createElement('div');
    p.className='petal';
    const dur=3+Math.random()*2.5;
    p.textContent=e[n%e.length];
    p.style.cssText=`left:${Math.random()*100}vw;font-size:${11+Math.random()*14}px;animation-duration:${dur}s;animation-delay:${Math.random()*.5}s;--pr:${(Math.random()-.5)*600}deg;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),(dur+1)*1000);
  },120);
}

/* ══ NAVIGATE ══ */
function goNext(){ window.location.href='main.html'; }

/* ══════════════════════════════
   MUSIC — carry through
══════════════════════════════ */
(function(){
  if(!window.bgMusic){
    window.bgMusic=new Audio('assets/music/anju-song.mp3');
    window.bgMusic.loop=true;
    window.bgMusic.volume=0.6;
    window.bgMusic.preload='auto';
  }
  try{
    const t=localStorage.getItem('musicTime');
    if(t) window.bgMusic.currentTime=parseFloat(t);
  }catch(e){}
  window.bgMusic.play().catch(()=>{});
  window.bgMusic.ontimeupdate=()=>{
    try{localStorage.setItem('musicTime',window.bgMusic.currentTime);}catch(e){}
  };
  document.addEventListener('touchstart',()=>window.bgMusic.play().catch(()=>{}),{once:true,passive:true});
  document.addEventListener('click',()=>window.bgMusic.play().catch(()=>{}),{once:true,passive:true});
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden) window.bgMusic.pause();
    else window.bgMusic.play().catch(()=>{});
  });
})();
</script>
