<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just a Little Wait ❤️</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f9a8d4, #c084fc);
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(14px);
      border-radius: 25px;
      padding: 30px;
      max-width: min(400px, 92vw);
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .photo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 20px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      margin-bottom: 10px;
    }

    .timer {
      font-size: clamp(15px,4.5vw,20px);
      margin: 15px 0;
      font-weight: bold;
    }

    .msg {
      font-size: 15px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="photo">
      <img src="assets/images/anju.jpg" alt="Anju">
    </div>

    <h1>അഞ്ജു ❤️</h1>

    <div class="msg">
      ഒരു ചെറിയ സർപ്രൈസ്…  
      <br>
      നിനക്ക് വേണ്ടി കാത്തിരിക്കുന്നു 🎁
    </div>

    <div class="timer" id="countdown">Loading…</div>
  </div>

  <script>
    // 🎂 April 8, 2026 — 00:00:00 IST (= 11:59:60 PM April 7 for Anju)
    const openDate = new Date("2026-04-08T00:00:00+05:30").getTime();

    function checkAndRedirect() {
      const now = Date.now();
      const diff = openDate - now;

      if (diff <= 0) {
        // Time's up — go!
        window.location.href = "cosmic-journey-anju.html";
        return true;
      }

      const days    = Math.floor(diff / 86400000);
      const hours   = Math.floor((diff / 3600000) % 24);
      const minutes = Math.floor((diff / 60000) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("countdown").innerHTML =
        days > 0
          ? `${days} ദിവസം ${hours} മണിക്കൂർ<br>${minutes} മിനിറ്റ് ${seconds} സെക്കന്റ്`
          : `${hours} മണിക്കൂർ ${minutes} മിനിറ്റ്<br>${seconds} സെക്കന്റ്`;

      return false;
    }

    // Check immediately on load (handles case where page opens after midnight)
    if (!checkAndRedirect()) {
      // Run every second
      const timer = setInterval(() => {
        if (checkAndRedirect()) clearInterval(timer);
      }, 1000);

      // CRITICAL FOR MOBILE: re-check on visibility change
      // When phone unlocks or Anju switches back to the tab,
      // this fires immediately — even if setInterval was frozen
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          if (checkAndRedirect()) clearInterval(timer);
        }
      });

      // Also re-check on focus (extra safety for some mobile browsers)
      window.addEventListener("focus", () => {
        checkAndRedirect();
      });

      // Also re-check on page show (back/forward cache on iOS Safari)
      window.addEventListener("pageshow", () => {
        checkAndRedirect();
      });
    }

    // 🔐 EMERGENCY UNLOCK (tap screen 7 times fast)
    let taps = 0, tapTimer;
    document.addEventListener("click", () => {
      taps++;
      clearTimeout(tapTimer);
      tapTimer = setTimeout(() => { taps = 0; }, 1500);
      if (taps >= 7) {
        window.location.href = "cosmic-journey-anju.html";
      }
    });

    // 🔐 Keyboard unlock (desktop/testing)
    let secret = "";
    document.addEventListener("keydown", (e) => {
      secret += e.key.toLowerCase();
      if (secret.includes("anjumol")) {
        window.location.href = "cosmic-journey-anju.html";
      }
      if (secret.length > 20) secret = secret.slice(-10);
    });
  </script>

</body>
</html>
