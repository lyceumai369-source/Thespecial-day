<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Anju! 🎂</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Segoe UI',sans-serif;
      background:#050510;
      min-height:100vh;
      overflow-x:hidden;
      display:flex;flex-direction:column;
      justify-content:center;align-items:center;
      padding:20px;
      transition:background 1.5s ease;
    }

    /* Stars */
    .star{
      position:fixed;border-radius:50%;
      background:#fff;pointer-events:none;
      animation:twinkle var(--d) infinite alternate;
    }
    @keyframes twinkle{from{opacity:0.1;}to{opacity:0.9;}}

    /* floating petals pre-blow */
    .petal{
      position:fixed;pointer-events:none;
      animation:petalFloat linear infinite;opacity:0;
      font-size:14px;z-index:0;
    }
    @keyframes petalFloat{
      0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
      15%{opacity:0.6;}85%{opacity:0.4;}
      100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
    }

    /* ── CAKE STAGE ── */
    #cakeStage{
      display:flex;flex-direction:column;
      align-items:center;
      z-index:10;position:relative;
      animation:fadeIn 1.2s ease;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

    /* candle + flame group */
    .candles-row{
      display:flex;gap:18px;
      margin-bottom:4px;
      position:relative;z-index:5;
    }
    .candle-wrap{display:flex;flex-direction:column;align-items:center;}
    .flame-wrap{
      width:18px;height:30px;position:relative;margin-bottom:2px;
    }
    .flame-outer{
      position:absolute;bottom:0;left:50%;transform:translateX(-50%);
      width:18px;height:30px;
      background:radial-gradient(ellipse at 50% 80%, #ffcc00 0%, #ff6600 60%, transparent 100%);
      border-radius:50% 50% 30% 30%;
      animation:flicker 0.12s infinite alternate;
      box-shadow:0 0 18px #ffcc00, 0 0 35px #ff6600, 0 0 60px rgba(255,150,0,0.3);
    }
    .flame-inner{
      position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
      width:8px;height:16px;
      background:radial-gradient(ellipse, #fff8dc 0%, #fff 60%, transparent 100%);
      border-radius:50% 50% 30% 30%;
    }
    @keyframes flicker{
      0%{transform:translateX(-50%) scaleX(1) scaleY(1);opacity:0.9;}
      100%{transform:translateX(-50%) scaleX(1.08) scaleY(1.12) rotate(2deg);opacity:1;}
    }
    .candle-stick{
      width:14px;height:55px;
      background:linear-gradient(180deg,#ff9ad5 0%,#ff4f81 50%,#c0002a 100%);
      border-radius:6px;
      box-shadow:0 5px 15px rgba(255,80,130,0.4);
      position:relative;
    }
    .candle-stick::after{
      content:'';position:absolute;top:5px;left:3px;
      width:4px;height:calc(100% - 10px);
      background:rgba(255,255,255,0.25);border-radius:2px;
    }

    /* cake emoji + glow */
    .cake-emoji-wrap{
      position:relative;
      display:flex;justify-content:center;align-items:center;
    }
    .cake-glow{
      position:absolute;
      width:180px;height:180px;border-radius:50%;
      background:radial-gradient(circle,rgba(255,80,130,0.3) 0%,transparent 70%);
      animation:glowPulse 2s ease-in-out infinite;
    }
    @keyframes glowPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
    .cake-emoji{
      font-size:clamp(70px,24vw,110px);position:relative;z-index:2;
      filter:drop-shadow(0 10px 30px rgba(255,80,130,0.6));
      cursor:pointer;
      transition:transform 0.2s;
    }
    .cake-emoji:hover{transform:scale(1.05);}

    .hint-text{
      color:#ffd700;margin-top:18px;font-size:17px;
      animation:pulse 1.5s infinite;text-align:center;
    }
    @keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:1;}}

    /* ── REVEAL ── */
    #revealStage{
      display:none;
      flex-direction:column;align-items:center;
      animation:revealIn 1s ease;
      position:relative;z-index:10;
      text-align:center;
    }
    @keyframes revealIn{from{transform:scale(0.75);opacity:0;}to{transform:scale(1);opacity:1;}}

    .reveal-photo-wrap{
      position:relative;margin-bottom:24px;
    }
    .reveal-photo{
      width:min(340px,90vw);
      border-radius:24px;
      border:3px solid #ffd700;
      box-shadow:0 0 60px rgba(255,215,0,0.5),0 30px 60px rgba(0,0,0,0.6);
    }
    .photo-sparkles{
      position:absolute;inset:-10px;
      pointer-events:none;
    }
    .sp{
      position:absolute;font-size:20px;
      animation:sparkleAnim 2s ease-in-out infinite;
    }
    @keyframes sparkleAnim{
      0%,100%{transform:scale(0.6);opacity:0.4;}
      50%{transform:scale(1.2);opacity:1;}
    }

    .reveal-title{
      font-size:clamp(15px,4.5vw,24px);
      font-weight:800;line-height:1.5;
      background:linear-gradient(45deg,#ffd700,#fff,#ffd700,#ff9ad5);
      background-size:200%;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      animation:shimmer 3s linear infinite;
      margin-bottom:16px;padding:0 16px;
    }
    @keyframes shimmer{0%{background-position:0%;}100%{background-position:200%;}}

    .reveal-sub{
      color:rgba(255,255,255,0.7);
      font-size:14px;line-height:1.8;
      font-style:italic;margin-bottom:24px;padding:0 20px;
    }

    /* big heart burst */
    .heart-burst{
      font-size:60px;
      animation:heartPop 0.6s ease;
      margin-bottom:16px;
    }
    @keyframes heartPop{
      0%{transform:scale(0);}60%{transform:scale(1.3);}100%{transform:scale(1);}
    }

    /* confetti */
    .conf{
      position:fixed;pointer-events:none;border-radius:2px;
      animation:confFall linear forwards;z-index:300;
    }
    @keyframes confFall{
      from{transform:translateY(-10px) rotate(0deg);opacity:1;}
      to{transform:translateY(110vh) rotate(720deg);opacity:0;}
    }

    /* big floating hearts on reveal */
    .big-heart{
      position:fixed;pointer-events:none;z-index:5;
      animation:floatBig linear forwards;
    }
    @keyframes floatBig{
      0%{transform:translateY(100vh) scale(0.5);opacity:0;}
      20%{opacity:0.8;}80%{opacity:0.6;}
      100%{transform:translateY(-10vh) scale(1.2);opacity:0;}
    }

    @media(max-width:380px){
      .candle-stick{width:11px;height:42px;}
      .flame-wrap{width:14px;height:24px;}
      .candle-stick{gap:12px;}
      .candles-row{gap:12px;}
      .reveal-title{font-size:16px;}
    }

      img { max-width: 100%; height: auto; }
  </style>
</head>
<body>

<script>
  /* stars */
  for(let i=0;i<80;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;
      left:${Math.random()*100}vw;top:${Math.random()*100}vh;
      --d:${1+Math.random()*3}s;`;
    document.body.appendChild(s);
  }
  /* petals */
  const petalEmojis=['🌸','💗','✨','🌺','💫'];
  for(let i=0;i<14;i++){
    const p=document.createElement('div');p.className='petal';
    p.innerText=petalEmojis[i%petalEmojis.length];
    p.style.left=Math.random()*100+'vw';
    p.style.animationDuration=(8+Math.random()*7)+'s';
    p.style.animationDelay=(Math.random()*8)+'s';
    document.body.appendChild(p);
  }
</script>

<!-- CAKE STAGE -->
<div id="cakeStage">
  <div class="candles-row">
    <div class="candle-wrap" id="c0">
      <div class="flame-wrap"><div class="flame-outer"></div><div class="flame-inner"></div></div>
      <div class="candle-stick"></div>
    </div>
    <div class="candle-wrap" id="c1">
      <div class="flame-wrap"><div class="flame-outer"></div><div class="flame-inner"></div></div>
      <div class="candle-stick"></div>
    </div>
    <div class="candle-wrap" id="c2">
      <div class="flame-wrap"><div class="flame-outer"></div><div class="flame-inner"></div></div>
      <div class="candle-stick"></div>
    </div>
    <div class="candle-wrap" id="c3">
      <div class="flame-wrap"><div class="flame-outer"></div><div class="flame-inner"></div></div>
      <div class="candle-stick"></div>
    </div>
  </div>

  <div class="cake-emoji-wrap">
    <div class="cake-glow"></div>
    <div class="cake-emoji" onclick="blowCandles()">🎂</div>
  </div>
  <div class="hint-text" id="hintText">ഇവിടെ ഒന്ന് തൊടൂ മോളേ… 💨</div>
</div>

<!-- REVEAL STAGE -->
<div id="revealStage">
  <div class="heart-burst">❤️</div>
  <div class="reveal-photo-wrap">
    <img src="assets/images/birthday_final.jpg" class="reveal-photo" alt="Happy Birthday Anju">
    <div class="photo-sparkles">
      <span class="sp" style="top:-5px;left:10%;animation-delay:0s">✨</span>
      <span class="sp" style="top:-5px;right:10%;animation-delay:0.4s">🌸</span>
      <span class="sp" style="bottom:10px;left:5%;animation-delay:0.8s">💫</span>
      <span class="sp" style="bottom:10px;right:5%;animation-delay:1.2s">⭐</span>
      <span class="sp" style="top:40%;left:-10px;animation-delay:0.6s">💗</span>
      <span class="sp" style="top:40%;right:-10px;animation-delay:1s">💗</span>
    </div>
  </div>

  <div class="reveal-title">
    🎉 Happy Birthday Anju! ❤️<br>
    എൻ്റെ മോൾക്ക് എല്ലാ സന്തോഷങ്ങളും ഉണ്ടാവട്ടെ!
  </div>
  <div class="reveal-sub">
    Once Again… Happy Birthday!<br>
    My one and only, my chakkara molee ❤️
  </div>

  <button onclick="goFinalTouch()" style="
    margin-top: 28px;
    padding: 16px 36px;
    font-size: 18px;
    font-weight: 700;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    background: linear-gradient(135deg, #ff4f81, #c471ed, #ffd700);
    background-size: 200%;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(255,80,130,0.5), 0 0 40px rgba(196,113,237,0.3);
    animation: btnShimmer 3s linear infinite, btnPulse 2s ease-in-out infinite;
    letter-spacing: 1px;
    position: relative;
    z-index: 20;
  ">✨ Final Touch ✨</button>
</div>

<style>
  @keyframes btnShimmer {
    0% { background-position: 0%; }
    100% { background-position: 200%; }
  }
  @keyframes btnPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 8px 30px rgba(255,80,130,0.5); }
    50% { transform: scale(1.05); box-shadow: 0 12px 40px rgba(255,80,130,0.8), 0 0 60px rgba(196,113,237,0.5); }
  }
</style>

<script>
function goFinalTouch() {
  // fade out then navigate
  document.body.style.transition = 'opacity 1s ease';
  document.body.style.opacity = '0';
  setTimeout(() => {
    window.location.href = 'anju_memories.html';
  }, 1000);
}
</script>

<script>
let blown=false;
function blowCandles(){
  if(blown)return;
  blown=true;

  // extinguish flames one by one
  const flames=document.querySelectorAll('.flame-outer,.flame-inner');
  flames.forEach((f,i)=>{
    setTimeout(()=>{
      f.style.transition='opacity 0.3s';
      f.style.opacity='0';
    },i*120);
  });

  document.getElementById('hintText').textContent='💨 Whoosh…';
  document.body.style.background='#000';

  setTimeout(()=>{
    document.getElementById('hintText').style.display='none';
    // fade out cake
    document.getElementById('cakeStage').style.transition='opacity 0.8s';
    document.getElementById('cakeStage').style.opacity='0';
    document.body.style.background='radial-gradient(circle at 50% 40%, #1a0030, #000)';

    setTimeout(()=>{
      document.getElementById('cakeStage').style.display='none';
      document.getElementById('revealStage').style.display='flex';
      launchConfetti();
      launchBigHearts();
    },900);
  },800);
}

function launchConfetti(){
  const colors=['#ff4f81','#ffd700','#c471ed','#12c2e9','#fff','#ff9ad5','#34d399'];
  for(let i=0;i<180;i++){
    const c=document.createElement('div');c.className='conf';
    c.style.left=Math.random()*100+'vw';c.style.top='-10px';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    const sz=5+Math.random()*10;
    c.style.width=sz+'px';c.style.height=sz+'px';
    c.style.borderRadius=Math.random()>0.5?'50%':'2px';
    c.style.animationDuration=(2+Math.random()*4)+'s';
    c.style.animationDelay=(Math.random()*2)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),6000);
  }
}

function launchBigHearts(){
  const e=['❤️','💕','🌸','💗','💖','✨'];
  for(let i=0;i<20;i++){
    const h=document.createElement('div');h.className='big-heart';
    h.innerText=e[i%e.length];
    h.style.left=Math.random()*100+'vw';
    h.style.fontSize=(20+Math.random()*30)+'px';
    h.style.animationDuration=(4+Math.random()*4)+'s';
    h.style.animationDelay=(Math.random()*3)+'s';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),8000);
  }
  setInterval(()=>{
    const h=document.createElement('div');h.className='big-heart';
    h.innerText=e[Math.floor(Math.random()*e.length)];
    h.style.left=Math.random()*100+'vw';
    h.style.fontSize=(16+Math.random()*24)+'px';
    h.style.animationDuration=(5+Math.random()*3)+'s';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),9000);
  },600);
}
</script>
<script>
(function(){
  /* ── Music engine: seamless across all pages ── */
  if (!window.bgMusic) {
    window.bgMusic = new Audio("assets/music/anju-song.mp3");
    window.bgMusic.loop = true;
    window.bgMusic.volume = 0.6;
    window.bgMusic.preload = "auto";
  }
  // Save position continuously
  window.bgMusic.ontimeupdate = function() {
    try { localStorage.setItem("musicTime", window.bgMusic.currentTime); } catch(e){}
  };
  // Restore position + try autoplay
  var _t = null;
  try { _t = localStorage.getItem("musicTime"); } catch(e){}
  if (_t) window.bgMusic.currentTime = parseFloat(_t);
  window.bgMusic.play().catch(function(){});

  // iOS Safari fix: play on very first touch anywhere on page
  function _tryPlay(){ window.bgMusic.play().catch(function(){}); }
  document.addEventListener("touchstart", _tryPlay, {once:true, passive:true});
  document.addEventListener("click",      _tryPlay, {once:true, passive:true});

  // Save before leaving
  window.addEventListener("pagehide", function(){
    try { localStorage.setItem("musicTime", window.bgMusic.currentTime); } catch(e){}
  });
  window.addEventListener("beforeunload", function(){
    try { localStorage.setItem("musicTime", window.bgMusic.currentTime); } catch(e){}
  });
  // Pause/resume on visibility change (battery + lag fix)
  document.addEventListener("visibilitychange", function(){
    if (document.hidden) window.bgMusic.pause();
    else window.bgMusic.play().catch(function(){});
  });
})();
</script>
</body>
</html>
